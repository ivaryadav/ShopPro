<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 88" fill="none">
  <defs>
    <linearGradient id="lg-bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1c3050"/>
      <stop offset="100%" stop-color="#09141f"/>
    </linearGradient>
    <linearGradient id="lg-wm" x1="98" y1="0" x2="260" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2ED4C4"/>
      <stop offset="100%" stop-color="#5B8EF9"/>
    </linearGradient>
    <linearGradient id="lg-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="44%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="56%" stop-color="transparent"/>
    </linearGradient>
    <filter id="lg-dg" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lg-mg" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lg-bgl" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="lg-tc">
      <path d="M 51,6 L 84,68 A 10,10 0 0,0 78,76 L 14,76 A 10,10 0 0,0 8,68 L 41,6 A 10,10 0 0,0 51,6 Z"/>
    </clipPath>
  </defs>

  <!-- ═══ TRIANGLE BADGE ═══ -->
  <path d="M 51,6 L 84,68 A 10,10 0 0,0 78,76 L 14,76 A 10,10 0 0,0 8,68 L 41,6 A 10,10 0 0,0 51,6 Z" fill="url(#lg-bg)"/>

  <!-- Shine sweep -->
  <g clip-path="url(#lg-tc)">
    <rect x="-200" y="-5" width="500" height="95" fill="url(#lg-shine)">
      <animateTransform attributeName="transform" type="translate" from="-250 0" to="250 0" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Pulsing glow border -->
  <path d="M 51,6 L 84,68 A 10,10 0 0,0 78,76 L 14,76 A 10,10 0 0,0 8,68 L 41,6 A 10,10 0 0,0 51,6 Z"
    fill="none" stroke="#2ED4C4" stroke-width="2.5" filter="url(#lg-bgl)">
    <animate attributeName="opacity" values="0.15;0.65;0.15" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <!-- Crisp border -->
  <path d="M 51,6 L 84,68 A 10,10 0 0,0 78,76 L 14,76 A 10,10 0 0,0 8,68 L 41,6 A 10,10 0 0,0 51,6 Z"
    fill="none" stroke="rgba(46,212,196,0.45)" stroke-width="0.8"/>

  <!-- ═══ INFINITY ∞ ═══ -->
  <!-- Infinity motion path definition -->
  <!-- path: M 46,50 → left loop → center → right loop → center (≈138px total) -->

  <!-- Dim static track -->
  <path d="M 46,50 C 38,35 18,35 18,50 C 18,65 38,65 46,50 C 54,35 74,35 74,50 C 74,65 54,65 46,50 Z"
    fill="none" stroke="rgba(46,212,196,0.16)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Comet trail dots — each is staggered 0.2s behind the previous -->
  <!-- Trail 3 (farthest back, dimmest) -->
  <circle r="2.5" fill="rgba(46,212,196,0.18)">
    <animateMotion dur="2.4s" begin="-1.8" repeatCount="indefinite" calcMode="linear"
      path="M 46,50 C 38,35 18,35 18,50 C 18,65 38,65 46,50 C 54,35 74,35 74,50 C 74,65 54,65 46,50 Z"/>
  </circle>
  <!-- Trail 2 -->
  <circle r="3.5" fill="rgba(46,212,196,0.28)">
    <animateMotion dur="2.4s" begin="-2.0" repeatCount="indefinite" calcMode="linear"
      path="M 46,50 C 38,35 18,35 18,50 C 18,65 38,65 46,50 C 54,35 74,35 74,50 C 74,65 54,65 46,50 Z"/>
  </circle>
  <!-- Trail 1 (closest, brightest trail) -->
  <circle r="4.5" fill="rgba(46,212,196,0.4)">
    <animateMotion dur="2.4s" begin="-2.2" repeatCount="indefinite" calcMode="linear"
      path="M 46,50 C 38,35 18,35 18,50 C 18,65 38,65 46,50 C 54,35 74,35 74,50 C 74,65 54,65 46,50 Z"/>
  </circle>

  <!-- Main dot — outer glow -->
  <circle r="7" fill="rgba(46,212,196,0.35)" filter="url(#lg-dg)">
    <animateMotion dur="2.4s" begin="0" repeatCount="indefinite" calcMode="linear"
      path="M 46,50 C 38,35 18,35 18,50 C 18,65 38,65 46,50 C 54,35 74,35 74,50 C 74,65 54,65 46,50 Z"/>
  </circle>
  <!-- Main dot — mid glow -->
  <circle r="4.5" fill="rgba(100,220,210,0.7)" filter="url(#lg-mg)">
    <animateMotion dur="2.4s" begin="0" repeatCount="indefinite" calcMode="linear"
      path="M 46,50 C 38,35 18,35 18,50 C 18,65 38,65 46,50 C 54,35 74,35 74,50 C 74,65 54,65 46,50 Z"/>
  </circle>
  <!-- Main dot — white core -->
  <circle r="2.5" fill="white">
    <animateMotion dur="2.4s" begin="0" repeatCount="indefinite" calcMode="linear"
      path="M 46,50 C 38,35 18,35 18,50 C 18,65 38,65 46,50 C 54,35 74,35 74,50 C 74,65 54,65 46,50 Z"/>
  </circle>

  <!-- Corner sparkles -->
  <circle cx="46" cy="5" r="2.5" fill="#2ED4C4" filter="url(#lg-dg)">
    <animate attributeName="opacity" values="0.9;0.1;0.9" dur="2.4s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;5;2.5" dur="2.4s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="83" cy="74" r="2.5" fill="#2ED4C4" filter="url(#lg-dg)">
    <animate attributeName="opacity" values="0.9;0.1;0.9" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;5;2.5" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="9" cy="74" r="2.5" fill="#2ED4C4" filter="url(#lg-dg)">
    <animate attributeName="opacity" values="0.9;0.1;0.9" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;5;2.5" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══ WORDMARK ═══ -->
  <text x="98" y="49" font-family="-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="36" font-weight="900" letter-spacing="-1.5" fill="url(#lg-wm)">Shop<tspan
    font-weight="300" fill="rgba(255,255,255,0.9)">Pro</tspan></text>

  <!-- ERP pill — tight to ShopPro text -->
  <rect x="243" y="14" width="30" height="14" rx="7"
    fill="rgba(46,212,196,0.1)" stroke="rgba(46,212,196,0.4)" stroke-width="1"/>
  <text x="258" y="25" font-family="-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="7.5" font-weight="800" letter-spacing="1.5" text-anchor="middle" fill="#2ED4C4">ERP</text>

  <!-- Tagline -->
  <text x="99" y="68" font-family="-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="8.5" font-weight="500" letter-spacing="3" fill="rgba(255,255,255,0.22)">MOBILE SHOP MANAGEMENT</text>
</svg>
